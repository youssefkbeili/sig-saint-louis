{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-6">Contact</h1>
    <div class="bg-white rounded-xl shadow-md p-8">
        <form method="post" action="/contact" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nom</label>
                <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Message</label>
                <textarea name="message" rows="5" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent"></textarea>
            </div>
            <button type="submit" class="bg-primary-700 hover:bg-primary-800 text-white px-6 py-3 rounded-lg font-semibold transition w-full">
                Envoyer
            </button>
        </form>
    </div>
</div>
{% endblock %}
