{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-12">
    <nav class="text-sm text-gray-400 mb-6">
        <a href="/" class="hover:text-primary-600">Accueil</a> <span class="mx-2">›</span>
        <span>Risques</span> <span class="mx-2">›</span>
        <span class="text-gray-700">{{ page_title }}</span>
    </nav>

    <h1 class="text-3xl md:text-4xl font-bold mb-6">{{ page_title }}</h1>

    <div class="grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1">
            {% block risk_description %}{% endblock %}
            <a href="/carte/" class="mt-6 inline-flex items-center gap-2 bg-primary-700 hover:bg-primary-800 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                🗺️ Voir sur la carte
            </a>
        </div>
        <div class="lg:col-span-2">
            <div id="risk-map" class="w-full h-[500px] rounded-xl shadow-lg border"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const map = L.map('risk-map').setView([16.02, -16.48], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    L.control.scale({ imperial: false }).addTo(map);
    {% block risk_layers %}{% endblock %}
</script>
{% endblock %}
